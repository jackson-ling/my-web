name: Deploy VitePress site to Pages

on:
  push:
    branches:
      - main # 当 main 分支有推送时触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'

      # 安装 pnpm 并设置版本
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.12

      # 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 构建 VitePress
      - name: Build VitePress
        run: |
          pnpm run docs:build
          touch .vitepress/dist/.nojekyll # 防止 GitHub Pages 使用 Jekyll 处理

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
